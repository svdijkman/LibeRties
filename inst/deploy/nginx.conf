# LibeRties TLS reverse proxy - nginx
# ---------------------------------------------------------------------------
# Terminates TLS and forwards to the local LibeRties API (bound to 127.0.0.1).
#
# Setup:
#   1. Obtain a certificate (Let's Encrypt/certbot, or an internal CA) and point
#      ssl_certificate / ssl_certificate_key at it.
#   2. Generate a shared secret and set the SAME value on the server:
#        LibeRties::ls_config_set(proxy_shared_secret = "<secret>")
#      and in the proxy_set_header X-Proxy-Secret line below.
#   3. Keep api_host = "127.0.0.1" (default) and run LibeRties::ls_run_api().
#   4. Reload nginx. Clients use an https:// base_url.
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    http2 on;
    server_name scheduler.example.com;

    ssl_certificate     /etc/ssl/certs/scheduler.crt;
    ssl_certificate_key /etc/ssl/private/scheduler.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    server_tokens off;

    # Large model/data payloads are sent as base64 JSON bodies.
    client_max_body_size 512m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Proxy-Secret "REPLACE_WITH_proxy_shared_secret";

        # Long-running estimations.
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

server {
    listen 80;
    server_name scheduler.example.com;
    return 301 https://$host$request_uri;
}
